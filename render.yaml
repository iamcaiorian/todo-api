databases:
  - name: todo-api-db
    databaseName: todo-api-db
    user: todo_user
    plan: free

services:
  - type: web
    name: todo-api
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-api-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
        value: fb910d9fda8998ab1e03a10439d21509
      - key: WEB_CONCURRENCY
        value: "2"
