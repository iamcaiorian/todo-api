services:
  - type: web
    name: todo-api
    runtime: ruby
    repo: https://github.com/iamcaiorian/todo-api
    plan: starter
    region: oregon
    buildCommand: bundle install && bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
        name: todo-api-db
        property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
        value: SUA_CHAVE_DO_MASTER_KEY
      - key: WEB_CONCURRENCY
        sync: false
        value: "2"
